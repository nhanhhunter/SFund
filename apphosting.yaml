scripts:
  buildCommand: npm run build
  runCommand: npm run start

env:
  - variable: VITE_FIREBASE_API_KEY
    secret: vite-firebase-api-key

  - variable: VITE_FIREBASE_AUTH_DOMAIN
    secret: vite-firebase-auth-domain

  - variable: VITE_FIREBASE_PROJECT_ID
    secret: vite-firebase-project-id

  - variable: VITE_FIREBASE_STORAGE_BUCKET
    secret: vite-firebase-storage-bucket

  - variable: VITE_FIREBASE_MESSAGING_SENDER_ID
    secret: vite-firebase-messaging-sender-id

  - variable: VITE_FIREBASE_APP_ID
    secret: vite-firebase-app-id

  - variable: CORS_ORIGIN
    secret: cors-origin

  - variable: VNSTOCK_API_KEY
    secret: vnstock-api-key
